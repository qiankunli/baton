<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="760" viewBox="0 0 1600 760">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10" fill="none" stroke="#111827" stroke-width="1.8"/>
    </marker>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif; fill: #111827; }
      .title { font-size: 24px; font-weight: 600; }
      .label { font-size: 20px; }
      .small { font-size: 17px; }
      .tiny { font-size: 14px; }
      .box { stroke: #111827; stroke-width: 3; }
      .flow { fill: none; stroke: #111827; stroke-width: 3; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect width="1600" height="760" fill="#ffffff"/>

  <text x="45" y="355" class="title">用户</text>
  <line x1="105" y1="350" x2="300" y2="350" class="flow"/>
  <text x="205" y="310" text-anchor="middle" class="small">Input / Response</text>
  <text x="205" y="335" text-anchor="middle" class="small">/ Control</text>

  <text x="365" y="72" class="title">chat-tui</text>
  <rect x="330" y="100" width="250" height="540" rx="12" fill="#eee8ff" class="box"/>
  <rect x="365" y="180" width="180" height="85" rx="42" fill="#e1d8ff" class="box"/>
  <text x="455" y="232" text-anchor="middle" class="label">intent</text>
  <rect x="365" y="485" width="180" height="85" rx="42" fill="#e1d8ff" class="box"/>
  <text x="455" y="537" text-anchor="middle" class="label">render</text>
  <line x1="455" y1="475" x2="455" y2="280" class="flow"/>

  <text x="760" y="72" class="title">baton</text>
  <rect x="650" y="100" width="650" height="540" rx="12" fill="#eef3fb" class="box"/>

  <rect x="735" y="165" width="250" height="110" rx="12" fill="#e7edf8" class="box"/>
  <text x="860" y="212" text-anchor="middle" class="label">SessionController</text>
  <text x="860" y="246" text-anchor="middle" class="label">+ queue</text>
  <line x1="580" y1="222" x2="720" y2="222" class="flow"/>

  <rect x="1080" y="145" width="170" height="400" rx="12" fill="#f7f8fc" class="box"/>
  <text x="1165" y="130" text-anchor="middle" class="title">Adapter</text>
  <rect x="1105" y="190" width="120" height="115" rx="60" fill="#e7ddff" class="box"/>
  <text x="1165" y="237" text-anchor="middle" class="small">Harness</text>
  <text x="1165" y="265" text-anchor="middle" class="small">Capability</text>
  <rect x="1105" y="405" width="120" height="90" rx="42" fill="#dff5e8" class="box"/>
  <text x="1165" y="460" text-anchor="middle" class="small">Normalize</text>
  <line x1="1000" y1="220" x2="1065" y2="220" class="flow"/>

  <rect x="835" y="420" width="130" height="90" rx="45" fill="#dfbd59" class="box"/>
  <text x="900" y="455" text-anchor="middle" class="label" fill="#ffffff">Event</text>
  <text x="900" y="485" text-anchor="middle" class="label" fill="#ffffff">Turn</text>
  <line x1="1080" y1="450" x2="980" y2="450" class="flow"/>
  <text x="1020" y="425" text-anchor="middle" class="tiny">driven + observed</text>
  <line x1="900" y1="405" x2="900" y2="290" class="flow"/>

  <polygon points="670,465 735,420 800,465 735,510" fill="#fff0bf" class="box"/>
  <text x="735" y="472" text-anchor="middle" class="small">reduce</text>
  <line x1="835" y1="465" x2="812" y2="465" class="flow"/>
  <line x1="670" y1="465" x2="595" y2="465" class="flow"/>

  <path d="M835 560 H965 V690 Q900 720 835 690 Z" fill="#dce4f8" class="box"/>
  <text x="900" y="630" text-anchor="middle" class="label">session.jsonl</text>
  <line x1="900" y1="525" x2="900" y2="548" class="flow"/>

  <text x="1400" y="72" text-anchor="middle" class="title">Harnesses</text>
  <circle cx="1400" cy="200" r="65" fill="#e7ddff" class="box"/>
  <text x="1400" y="208" text-anchor="middle" class="label">Codex</text>
  <circle cx="1400" cy="370" r="65" fill="#e7ddff" class="box"/>
  <text x="1400" y="378" text-anchor="middle" class="label">Claude</text>
  <circle cx="1400" cy="540" r="65" fill="#e7ddff" class="box"/>
  <text x="1400" y="548" text-anchor="middle" class="label">…</text>
  <line x1="1320" y1="370" x2="1265" y2="370" class="flow"/>

  <line x1="330" y1="527" x2="115" y2="527" class="flow"/>
  <text x="215" y="487" text-anchor="middle" class="small">Transcript / Request</text>
  <text x="215" y="512" text-anchor="middle" class="small">/ Status</text>
</svg>
